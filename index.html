<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>世界和平积分</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); min-height:100vh; font-family:'PingFang SC','Microsoft YaHei',sans-serif; color:#fff; padding:16px; -webkit-tap-highlight-color:transparent; }
.container { max-width:600px; margin:0 auto; }

.header { text-align:center; margin:16px 0 20px; }
.header h1 { font-size:26px; color:#e0e0ff; margin-bottom:4px; }
.header .total { font-size:15px; color:#ffd740; background:rgba(255,215,64,0.1); display:inline-block; padding:6px 18px; border-radius:20px; border:1px solid rgba(255,215,64,0.2); }

/* Summary bar */
.summary-bar { background:rgba(255,255,255,0.05); border-radius:14px; padding:16px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.08); }
.summary-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
.summary-item { text-align:center; flex:1; min-width:80px; }
.summary-item .label { font-size:11px; color:#888; margin-bottom:2px; }
.summary-item .value { font-size:20px; font-weight:bold; }
.positive { color:#69f0ae; }
.negative { color:#ff5252; }
.zero { color:#aaa; }

/* Budget card */
.budget-card { background:rgba(255,215,64,0.08); border-radius:14px; padding:16px; margin-bottom:16px; border:1px solid rgba(255,215,64,0.15); display:flex; justify-content:space-between; align-items:center; }
.budget-label { font-size:14px; color:#ffd740; }
.budget-value { font-size:24px; font-weight:bold; color:#ffd740; }

/* People list */
.person-list { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }

.person-card { background:rgba(255,255,255,0.04); border-radius:12px; padding:12px 16px; border:1px solid rgba(255,255,255,0.06); display:flex; align-items:center; gap:12px; transition:all 0.2s; }
.person-card:hover { background:rgba(255,255,255,0.06); }
.person-card.editing { border-color:#7c4dff; background:rgba(124,77,255,0.08); }

.person-name { font-size:15px; font-weight:bold; min-width:50px; }
.person-score { font-size:18px; font-weight:bold; min-width:70px; text-align:right; }
.person-score.pos { color:#69f0ae; }
.person-score.neg { color:#ff5252; }

.edit-row { display:flex; gap:6px; align-items:center; flex:1; margin-left:auto; }
.edit-row input { width:70px; padding:8px; border-radius:8px; border:2px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.08); color:#fff; font-size:15px; text-align:center; outline:none; font-family:inherit; }
.edit-row input:focus { border-color:#7c4dff; }
.edit-row .op-btn { padding:8px 12px; border-radius:8px; border:none; font-size:13px; font-weight:bold; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
.op-btn.add { background:#69f0ae; color:#000; }
.op-btn.sub { background:#ff5252; color:#fff; }
.op-btn:active { transform:scale(0.95); }

/* Buttons row */
.btn-row { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
.btn-row button { flex:1; min-width:120px; padding:14px 20px; border-radius:12px; border:none; font-size:15px; font-weight:bold; cursor:pointer; transition:all 0.15s; font-family:inherit; }
.btn-primary { background:linear-gradient(135deg,#7c4dff,#448aff); color:#fff; }
.btn-success { background:linear-gradient(135deg,#00c853,#69f0ae); color:#000; }
.btn-warning { background:linear-gradient(135deg,#ff6d00,#ffab40); color:#000; }
.btn-row button:active { transform:scale(0.97); }

/* Summary text area */
#summaryBox { display:none; margin-top:16px; }
#summaryBox textarea { width:100%; height:200px; padding:14px; border-radius:12px; background:rgba(255,255,255,0.06); color:#fff; border:1px solid rgba(255,255,255,0.1); font-size:13px; font-family:'PingFang SC','Microsoft YaHei',monospace; resize:vertical; outline:none; line-height:1.8; }
#summaryBox .copy-btn { margin-top:10px; padding:10px 24px; border-radius:10px; border:none; background:rgba(255,255,255,0.1); color:#fff; cursor:pointer; font-size:14px; font-family:inherit; }
#summaryBox .copy-btn:active { transform:scale(0.97); }

/* History */
#historyBox { margin-top:16px; }
#historyBox h3 { font-size:14px; color:#888; margin-bottom:8px; }
.history-item { font-size:12px; color:#666; padding:4px 0; border-bottom:1px solid rgba(255,255,255,0.03); }

/* Modal for edit */
.modal-overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.7); z-index:50; display:none; justify-content:center; align-items:center; }
.modal { background:#1a1a2e; border-radius:16px; padding:24px; border:1px solid rgba(255,255,255,0.1); min-width:280px; }
.modal h3 { margin-bottom:16px; color:#e0e0ff; }
.modal .amount-row { display:flex; gap:8px; margin-bottom:16px; }
.modal input { flex:1; padding:12px; border-radius:10px; border:2px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.08); color:#fff; font-size:18px; text-align:center; outline:none; font-family:inherit; }
.modal input:focus { border-color:#7c4dff; }
.modal .modal-btns { display:flex; gap:8px; }
.modal button { flex:1; padding:12px; border-radius:10px; border:none; font-size:15px; font-weight:bold; cursor:pointer; font-family:inherit; }

/* Chart */
#chartBox { background:rgba(255,255,255,0.04); border-radius:14px; padding:16px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.06); }
#chartBox h3 { font-size:13px; color:#888; margin-bottom:12px; }
.chart-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.chart-label { width:44px; font-size:13px; font-weight:bold; text-align:right; flex-shrink:0; }
.chart-bar-wrap { flex:1; height:22px; background:rgba(255,255,255,0.04); border-radius:6px; overflow:hidden; position:relative; }
.chart-bar { height:100%; border-radius:6px; transition:width 0.4s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; min-width:30px; }
.chart-bar.pos { background:linear-gradient(90deg,#69f0ae,#00c853); }
.chart-bar.neg { background:linear-gradient(90deg,#ff5252,#d50000); }
.chart-bar.zero { background:rgba(255,255,255,0.1); }
.chart-value { font-size:10px; font-weight:bold; color:#fff; text-shadow:0 0 4px rgba(0,0,0,0.5); white-space:nowrap; }
.rank-badge { display:inline-block; width:20px; height:20px; line-height:20px; text-align:center; border-radius:50%; font-size:10px; font-weight:bold; margin-right:4px; }
.rank-1 { background:#ffd700; color:#000; }
.rank-2 { background:#c0c0c0; color:#000; }
.rank-3 { background:#cd7f32; color:#fff; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🕊️ 世界和平积分</h1>
    <div class="total">总积分：<span id="totalScore">813</span></div>
  </div>

  <div id="chartBox">
    <h3>🏆 排行榜</h3>
    <div id="chartContent"></div>
  </div>

  <div class="summary-bar">
    <div class="summary-row" id="summaryStats"></div>
  </div>

  <div class="budget-card" onclick="openBudgetEdit()" style="cursor:pointer;">
    <span class="budget-label">💰 总经费结余（点击调整）</span>
    <span class="budget-value" id="budget">0</span>
  </div>

  <div class="person-list" id="personList"></div>

  <div class="btn-row">
    <button class="btn-success" onclick="showSummary()">📋 一键汇总</button>
    <button class="btn-warning" onclick="showHistory()">📜 变更记录</button>
  </div>

  <!-- Save/Load -->
  <div style="background:rgba(255,255,255,0.04);border-radius:14px;padding:16px;margin-bottom:16px;border:1px solid rgba(255,255,255,0.06);">
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;">
      <input type="text" id="snapshotName" placeholder="存档名称，如：6月第1周" maxlength="20" style="flex:1;padding:10px;border-radius:8px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;font-size:14px;outline:none;font-family:inherit;">
      <button onclick="doSave()" style="padding:10px 18px;border-radius:8px;border:none;background:linear-gradient(135deg,#7c4dff,#448aff);color:#fff;font-weight:bold;cursor:pointer;font-family:inherit;white-space:nowrap;">💾 存档</button>
    </div>
    <div id="snapshotList" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
  </div>

  <div id="summaryBox">
    <textarea id="summaryText" readonly></textarea>
    <button class="copy-btn" onclick="copySummary()">📋 复制文字</button>
  </div>

  <div id="historyBox"></div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">调整积分</h3>
    <div class="amount-row">
      <input type="number" id="modalAmount" placeholder="输入金额" inputmode="numeric">
    </div>
    <p style="color:#888;font-size:12px;margin-bottom:12px;text-align:center;" id="budgetPreview"></p>
    <div class="modal-btns">
      <button class="op-btn add" onclick="applyChange(1)">➕ 增加（经费-）</button>
      <button class="op-btn sub" onclick="applyChange(-1)">➖ 减少（经费+）</button>
    </div>
  </div>
</div>

<!-- Chart Modal -->
<div class="modal-overlay" id="chartOverlay" onclick="if(event.target===this)closeChart()">
  <div class="modal" style="min-width:320px;max-width:90vw;">
    <h3 id="chartTitle"></h3>
    <canvas id="lineChart" width="300" height="200" style="width:100%;border-radius:8px;background:rgba(0,0,0,0.3);"></canvas>
    <div style="text-align:center;margin-top:10px;">
      <button onclick="closeChart()" style="padding:8px 24px;border-radius:8px;border:none;background:rgba(255,255,255,0.15);color:#fff;cursor:pointer;font-family:inherit;font-size:14px;">关闭</button>
    </div>
  </div>
</div>
</div>

<script>
// ==================== DATA ====================
const INITIAL_DATA = [
  { name:'老李', score:870 },
  { name:'老胡', score:2455 },
  { name:'老殷', score:-1385 },
  { name:'老姜', score:-1140 },
  { name:'老张', score:1300 },
  { name:'老刘', score:960 },
  { name:'老徐', score:-1380 },
  { name:'老邵', score:1790 },
  { name:'老杨', score:0 },
];

let people = [];
let history = [];
let personHistory = {}; // { name: [{time, score}] }
let budget = 0;
let editTarget = null;
const STORAGE_KEY = 'pts_data_v2';

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      people = d.people || [...INITIAL_DATA.map(p=>({...p}))];
      budget = d.budget !== undefined ? d.budget : 600;
      history = d.history || [];
      personHistory = d.personHistory || {};
    } else {
      people = INITIAL_DATA.map(p=>({...p}));
      budget = 600;
      history = [];
      personHistory = {};
    }
  } catch(e) {
    people = INITIAL_DATA.map(p=>({...p}));
    budget = 600;
    history = [];
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({people,budget,history,personHistory}));
}

function getTotal() {
  return people.reduce((s,p)=>s+p.score,0);
}

// ==================== RENDER ====================
function renderAll() {
  renderChart();
  renderStats();
  renderBudget();
  renderPeople();
  save();
}

function renderChart() {
  const sorted = [...people].sort((a,b)=>b.score-a.score);
  const maxAbs = Math.max(Math.abs(sorted[0]?.score||1), Math.abs(sorted[sorted.length-1]?.score||1), 1);
  const ranks = ['🥇','🥈','🥉'];
  document.getElementById('chartContent').innerHTML = sorted.map((p,i) => {
    const pct = Math.abs(p.score)/maxAbs*100;
    const cls = p.score>0?'pos':p.score<0?'neg':'zero';
    const rankCls = i<3?`rank-${i+1}`:'';
    const rankBadge = i<3?`<span class="rank-badge ${rankCls}">${ranks[i]}</span>`:`<span class="rank-badge" style="color:#666">${i+1}</span>`;
    return `<div class="chart-row">
      <div class="chart-label">${rankBadge}${p.name}</div>
      <div class="chart-bar-wrap">
        <div class="chart-bar ${cls}" style="width:${Math.max(pct,3)}%">
          <span class="chart-value">${p.score>0?'+':''}${p.score}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderStats() {
  const total = getTotal();
  document.getElementById('totalScore').textContent = total;
  const pos = people.filter(p=>p.score>0).length;
  const neg = people.filter(p=>p.score<0).length;
  const zero = people.filter(p=>p.score===0).length;
  const maxP = Math.max(...people.map(p=>p.score));
  const minP = Math.min(...people.map(p=>p.score));
  const maxName = people.find(p=>p.score===maxP)?.name||'';
  const minName = people.find(p=>p.score===minP)?.name||'';
  document.getElementById('summaryStats').innerHTML = `
    <div class="summary-item"><div class="label">👥 人数</div><div class="value" style="color:#e0e0ff">${people.length}</div></div>
    <div class="summary-item"><div class="label">📈 正分</div><div class="value positive">${pos}人</div></div>
    <div class="summary-item"><div class="label">📉 负分</div><div class="value negative">${neg}人</div></div>
    <div class="summary-item"><div class="label">🏆 最高</div><div class="value positive">${maxName} ${maxP}</div></div>
    <div class="summary-item"><div class="label">🔻 最低</div><div class="value negative">${minName} ${minP}</div></div>
  `;
}

function renderBudget() {
  document.getElementById('budget').textContent = budget;
}

function renderPeople() {
  const list = document.getElementById('personList');
  list.innerHTML = people.map((p,i) => {
    const cls = p.score>0?'pos':p.score<0?'neg':'';
    return `<div class="person-card" id="person-${i}">
      <span class="person-name" onclick="openChart('${p.name.replace(/'/g,"\\'")}')" style="cursor:pointer;">${p.name}</span>
      <span class="person-score ${cls}">${p.score>0?'+':''}${p.score}</span>
      <div style="flex:1"></div>
      <span onclick="openEdit(${i})" style="color:#7c4dff;font-size:12px;cursor:pointer;">调整</span>
    </div>`;
  }).join('');
}

// ==================== EDIT ====================
function openEdit(index) {
  editTarget = index;
  const p = people[index];
  document.getElementById('modalTitle').textContent = `${p.name} 当前积分：${p.score>0?'+':''}${p.score}`;
  document.getElementById('modalAmount').value = '';
  document.getElementById('budgetPreview').textContent = '';
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(()=>document.getElementById('modalAmount').focus(), 100);
}

// Live budget preview
document.getElementById('modalAmount').addEventListener('input', function() {
  const v = parseInt(this.value)||0;
  if(v>0){
    document.getElementById('budgetPreview').innerHTML = 
      `➕增加：经费 <span style="color:#ff5252">-${v}</span>（${budget}→${budget-v}） | ➖减少：经费 <span style="color:#69f0ae">+${v}</span>（${budget}→${budget+v}）`;
  } else {
    document.getElementById('budgetPreview').textContent = '';
  }
});

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  document.getElementById('modalAmount').style.display = '';
  document.getElementById('modalAmount').value = '';
  document.querySelector('#modalOverlay .modal-btns').innerHTML = `
    <button class="op-btn add" onclick="applyChange(1)">➕ 增加（经费-）</button>
    <button class="op-btn sub" onclick="applyChange(-1)">➖ 减少（经费+）</button>
  `;
  editTarget = null;
}

function applyChange(sign) {
  const amount = parseInt(document.getElementById('modalAmount').value);
  if(!amount || amount<=0) return;
  
  // Step 1: Show confirmation instead of applying immediately
  const p = people[editTarget];
  const change = amount * sign;
  const newScore = p.score + change;
  const newBudget = budget - change;
  
  document.getElementById('modalTitle').textContent = '⚠️ 确认操作';
  document.getElementById('modalAmount').style.display = 'none';
  document.getElementById('budgetPreview').innerHTML = `
    <b>${p.name}</b>：${p.score>0?'+':''}${p.score} →
    <span style="color:${change>0?'#69f0ae':'#ff5252'}">${change>0?'+':''}${change}</span> →
    <b>${newScore>0?'+':''}${newScore}</b><br>
    经费：${budget} → <b>${newBudget}</b>
  `;
  document.querySelector('#modalOverlay .modal-btns').innerHTML = `
    <button class="op-btn sub" onclick="cancelConfirm()" style="background:#666;">取消</button>
    <button class="op-btn add" onclick="doConfirm(${sign})">✅ 确认</button>
  `;
  // Store amount for confirmation
  document.getElementById('modalAmount').dataset.pendingAmount = amount;
}
function doConfirm(sign) {
  const amount = parseInt(document.getElementById('modalAmount').dataset.pendingAmount);
  const change = amount * sign;
  people[editTarget].score += change;
  budget -= change;
  const now = new Date();
  const time = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  history.unshift({time, name: people[editTarget].name, change: change>0?`+${change}`:`${change}`, score: people[editTarget].score});
  if(!personHistory[people[editTarget].name]) personHistory[people[editTarget].name] = [];
  personHistory[people[editTarget].name].push({time, score: people[editTarget].score});
  if(personHistory[people[editTarget].name].length>200) personHistory[people[editTarget].name].shift();
  if(history.length>50) history.length=50;
  closeModal();
  renderAll();
}
function cancelConfirm() {
  // Reset modal to input state
  document.getElementById('modalAmount').style.display = '';
  document.getElementById('modalAmount').value = '';
  document.getElementById('modalAmount').dataset.pendingAmount = '';
  document.getElementById('budgetPreview').textContent = '';
  document.getElementById('modalTitle').textContent = `${people[editTarget].name} 当前积分：${people[editTarget].score>0?'+':''}${people[editTarget].score}`;
  document.querySelector('#modalOverlay .modal-btns').innerHTML = `
    <button class="op-btn add" onclick="applyChange(1)">➕ 增加（经费-）</button>
    <button class="op-btn sub" onclick="applyChange(-1)">➖ 减少（经费+）</button>
  `;
  document.getElementById('modalAmount').focus();
}

// Keyboard: Enter to submit as add
document.getElementById('modalAmount').addEventListener('keydown', e => {
  if(e.key==='Enter') { applyChange(1); }
  if(e.key==='Escape') { closeModal(); }
});

// ==================== SUMMARY ====================
let lastSummary = null; // {people, budget, time}

function showSummary() {
  const box = document.getElementById('summaryBox');
  if(box.style.display==='block'){ box.style.display='none'; return; }
  
  const total = getTotal();
  const sorted = [...people].sort((a,b)=>b.score-a.score);
  const now = new Date().toLocaleString('zh-CN');
  
  let text = '═══════════════════\n';
  text += '   🕊️ 世界和平积分\n';
  text += `   ${now}\n`;
  text += '═══════════════════\n\n';
  text += '【个人积分】\n';
  sorted.forEach((p,i) => {
    const sign = p.score>0?'+':p.score<0?'':' ';
    text += `${i+1}. ${p.name}：${sign}${p.score}\n`;
  });
  text += '\n───────────────────\n';
  text += `总积分：${total}\n`;
  text += `总经费：${budget}\n`;
  text += `人数：${people.length}\n`;
  
  // Show changes since last summary
  if(lastSummary){
    text += '\n───────────────────\n';
    text += '【本次变化】\n';
    const changes = [];
    const budgetChange = budget - lastSummary.budget;
    for(const p of people){
      const prev = lastSummary.people.find(x=>x.name===p.name);
      if(!prev && p.score!==0) changes.push(`${p.name}：新增 ${p.score>0?'+':''}${p.score}`);
      else if(prev && prev.score !== p.score){
        const diff = p.score - prev.score;
        changes.push(`${p.name}：${prev.score>0?'+':''}${prev.score} → ${p.score>0?'+':''}${p.score}（${diff>0?'+':''}${diff}）`);
      }
    }
    if(budgetChange !== 0) changes.push(`💰经费：${lastSummary.budget} → ${budget}（${budgetChange>0?'+':''}${budgetChange}）`);
    if(changes.length===0) text += '（无变化）\n';
    else changes.forEach(c=>text+=`  ${c}\n`);
  }
  
  const pos = sorted.filter(p=>p.score>0);
  const neg = sorted.filter(p=>p.score<0);
  text += '\n───────────────────\n';
  text += `正分：${pos.length}人（${pos.map(p=>p.name).join('、')}）\n`;
  text += `负分：${neg.length}人（${neg.map(p=>p.name).join('、')}）\n`;
  text += '═══════════════════\n';
  
  // Save snapshot for next diff
  lastSummary = {
    people: people.map(p=>({name:p.name, score:p.score})),
    budget,
    time: now
  };
  
  document.getElementById('summaryText').value = text;
  box.style.display = 'block';
  box.scrollIntoView({behavior:'smooth'});
}

function copySummary() {
  const ta = document.getElementById('summaryText');
  ta.select();
  document.execCommand('copy');
  
  // Visual feedback
  const btn = document.querySelector('#summaryBox .copy-btn');
  const orig = btn.textContent;
  btn.textContent = '✅ 已复制!';
  setTimeout(()=>btn.textContent=orig, 1500);
}

function showHistory() {
  const box = document.getElementById('historyBox');
  if(history.length===0){
    box.innerHTML = '<p style="color:#666;font-size:13px;">暂无变更记录</p>';
    return;
  }
  box.innerHTML = '<h3>📜 变更记录</h3>' + history.map(h =>
    `<div class="history-item">${h.time} | ${h.name}: <span style="color:${h.change.startsWith('+')?'#69f0ae':'#ff5252'}">${h.change}</span> → ${h.score>0?'+':''}${h.score}</div>`
  ).join('');
  box.scrollIntoView({behavior:'smooth'});
}

// ==================== SNAP SAVE/LOAD ====================
const SNAP_KEY = 'pts_snapshots';

function getSnapshots() {
  try { return JSON.parse(localStorage.getItem(SNAP_KEY)||'[]'); } catch(e) { return []; }
}
function saveSnapshots(list) {
  localStorage.setItem(SNAP_KEY, JSON.stringify(list));
}

function doSave() {
  const name = document.getElementById('snapshotName').value.trim();
  if(!name){ alert('请输入存档名称'); return; }
  const snaps = getSnapshots();
  // Remove existing with same name
  const idx = snaps.findIndex(s=>s.name===name);
  const snap = {
    name,
    people: people.map(p=>({...p})),
    budget,
    total: getTotal(),
    time: new Date().toLocaleString('zh-CN')
  };
  if(idx>=0) snaps[idx] = snap;
  else snaps.unshift(snap);
  if(snaps.length>20) snaps.length=20;
  saveSnapshots(snaps);
  document.getElementById('snapshotName').value='';
  renderSnapshots();
  // Flash feedback
  const btn = document.querySelector('#snapshotName + button');
  const orig = btn.textContent;
  btn.textContent='✅ 已保存';
  setTimeout(()=>btn.textContent=orig, 1200);
}

function doLoad(name) {
  if(!confirm(`确定加载存档「${name}」？当前数据将被覆盖。`)) return;
  const snaps = getSnapshots();
  const snap = snaps.find(s=>s.name===name);
  if(!snap) return;
  people = snap.people.map(p=>({...p}));
  budget = snap.budget;
  history.unshift({
    time: new Date().toLocaleString('zh-CN').slice(5,16),
    name: '系统',
    change: `加载存档「${name}」`,
    score: snap.total
  });
  save();
  renderAll();
}

function doDeleteSnap(name) {
  const snaps = getSnapshots().filter(s=>s.name!==name);
  saveSnapshots(snaps);
  renderSnapshots();
}

function renderSnapshots() {
  const snaps = getSnapshots();
  const list = document.getElementById('snapshotList');
  if(snaps.length===0){ list.innerHTML='<span style="color:#666;font-size:12px;">暂无存档，输入名称后点「存档」</span>'; return; }
  list.innerHTML = snaps.map(s=>
    `<span style="background:rgba(255,255,255,0.05);border-radius:8px;padding:6px 10px;font-size:12px;display:inline-flex;align-items:center;gap:6px;">
      <b style="color:#4fc3f7;cursor:pointer;" onclick="doLoad('${s.name.replace(/'/g,"\\'")}')" title="点击加载">${s.name}</b>
      <span style="color:#888;">总分${s.total} | ${s.time.slice(5,16)}</span>
      <span style="color:#ff5252;cursor:pointer;font-size:10px;" onclick="doDeleteSnap('${s.name.replace(/'/g,"\\'")}')">✕</span>
    </span>`
  ).join('');
}


// ==================== PERSON CHART ====================
function openChart(name) {
  const data = personHistory[name] || [];
  if(data.length===0){
    // Show current score as single point
    const p = people.find(x=>x.name===name);
    if(!p) return;
    document.getElementById('chartTitle').textContent = `${name} 积分趋势（暂无历史记录）`;
    const canvas = document.getElementById('lineChart');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 200;
    ctx.fillStyle = '#666';
    ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`当前积分：${p.score>0?'+':''}${p.score}`, 150, 100);
    ctx.fillText('调整积分后会生成趋势图', 150, 130);
  } else {
    document.getElementById('chartTitle').textContent = `${name} 积分趋势（${data.length}次记录）`;
    drawLineChart(data, name);
  }
  document.getElementById('chartOverlay').style.display = 'flex';
}

function closeChart() {
  document.getElementById('chartOverlay').style.display = 'none';
}

function drawLineChart(data, name) {
  const canvas = document.getElementById('lineChart');
  const ctx = canvas.getContext('2d');
  canvas.width = 300; canvas.height = 200;
  const W = canvas.width, H = canvas.height;
  const pad = { top: 20, right: 15, bottom: 30, left: 45 };
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  const scores = data.map(d=>d.score);
  const minS = Math.min(...scores, 0);
  const maxS = Math.max(...scores, 0);
  const range = maxS - minS || 1;

  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0, 0, W, H);

  // Axes
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, H-pad.bottom);
  ctx.lineTo(W-pad.right, H-pad.bottom);
  ctx.stroke();

  // Zero line
  if(minS<0 && maxS>0){
    const zy = pad.top + ph * (maxS/range);
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.setLineDash([3,5]);
    ctx.beginPath(); ctx.moveTo(pad.left, zy); ctx.lineTo(W-pad.right, zy); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Grid & labels
  ctx.fillStyle = '#888'; ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
  for(let i=0;i<=3;i++){
    const y = pad.top + ph*i/3;
    const val = maxS - range*i/3;
    ctx.fillText(Math.round(val), pad.left-4, y+3);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(W-pad.right, y); ctx.stroke();
  }

  // Time labels
  ctx.textAlign = 'center';
  const maxLabels = 5;
  const step = Math.max(1, Math.floor(data.length/maxLabels));
  for(let i=0;i<data.length;i+=step){
    const x = pad.left + pw*i/(data.length-1||1);
    const t = data[i].time || '';
    ctx.fillText(t.slice(5), x, H-pad.bottom+14);
  }

  // Line
  ctx.strokeStyle = '#4fc3f7';
  ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x = pad.left + pw*i/(data.length-1||1);
    const y = pad.top + ph*(1-(d.score-minS)/range);
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Gradient fill under line
  const grad = ctx.createLinearGradient(0,pad.top,0,H-pad.bottom);
  grad.addColorStop(0,'rgba(79,195,247,0.3)');
  grad.addColorStop(1,'rgba(79,195,247,0)');
  ctx.lineTo(pad.left + pw*(data.length-1)/(data.length-1||1), H-pad.bottom);
  ctx.lineTo(pad.left, H-pad.bottom);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Dots
  data.forEach((d,i)=>{
    const x = pad.left + pw*i/(data.length-1||1);
    const y = pad.top + ph*(1-(d.score-minS)/range);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4fc3f7';
    ctx.beginPath(); ctx.arc(x,y,2,0,Math.PI*2); ctx.fill();
  });
}


// ==================== BUDGET EDIT ====================
let budgetEditSign = 0;

function openBudgetEdit() {
  document.getElementById('modalTitle').textContent = '💰 调整总经费 当前：'+budget;
  document.getElementById('modalAmount').value = '';
  document.getElementById('modalAmount').style.display = '';
  document.getElementById('budgetPreview').textContent = '';
  document.querySelector('#modalOverlay .modal-btns').innerHTML = `
    <button class="op-btn sub" onclick="applyBudgetChange(-1)">➖ 减少经费</button>
    <button class="op-btn add" onclick="applyBudgetChange(1)">➕ 增加经费</button>
  `;
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(()=>document.getElementById('modalAmount').focus(), 100);
}
function applyBudgetChange(sign) {
  const amount = parseInt(document.getElementById('modalAmount').value);
  if(!amount || amount<=0) return;
  const change = amount * sign;
  document.getElementById('modalTitle').textContent = '⚠️ 确认经费调整';
  document.getElementById('modalAmount').style.display = 'none';
  document.getElementById('budgetPreview').innerHTML = `
    经费：${budget} <span style="color:${change>0?'#69f0ae':'#ff5252'}">${change>0?'+':''}${change}</span> → <b>${budget+change}</b>
  `;
  document.querySelector('#modalOverlay .modal-btns').innerHTML = `
    <button class="op-btn" onclick="cancelConfirm()" style="background:#666;">取消</button>
    <button class="op-btn add" onclick="confirmBudget(${sign})">✅ 确认</button>
  `;
  document.getElementById('modalAmount').dataset.pendingAmount = amount;
}
function confirmBudget(sign) {
  const amount = parseInt(document.getElementById('modalAmount').dataset.pendingAmount);
  budget += amount * sign;
  const now = new Date();
  const time = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  history.unshift({time, name:'💰经费', change: (amount*sign>0?'+':'')+(amount*sign), score: budget});
  if(history.length>50) history.length=50;
  closeModal();
  renderAll();
}
